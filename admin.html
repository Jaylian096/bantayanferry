<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Bantayan Ferry</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div id="admin-app">

<!-- ADMIN LOGIN -->
<div id="admin-login-screen">
  <div class="auth-screen">
    <div class="auth-hero" style="padding-top:80px">
      <div class="auth-icon">🛠️</div>
      <h1>Admin Panel</h1>
      <p>Bantayan Ferry Management</p>
    </div>
    <div class="auth-card">
      <form id="admin-login-form">
        <div class="form-group">
          <label>Admin Email</label>
          <input type="email" id="admin-email" class="form-control" placeholder="admin@bantayanferry.com" required>
        </div>
        <div class="form-group" style="margin-top:14px">
          <label>Password</label>
          <input type="password" id="admin-password" class="form-control" placeholder="Enter admin password" required>
        </div>
        <button type="submit" id="btn-admin-login" class="btn btn-primary" style="margin-top:20px">Sign In as Admin</button>
      </form>
    </div>
    <div class="auth-footer"><a href="index.html">← Back to User App</a></div>
  </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-dashboard-screen" class="hidden">
  <!-- Sidebar Overlay -->
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="admin-sidebar" id="admin-sidebar">
    <div class="sidebar-logo">
      <h2>⛴️ Bantayan Ferry</h2>
      <p>Admin Panel</p>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-item active" onclick="loadAdminSection('dashboard')"><span class="si-icon">📊</span> Dashboard</button>
      <button class="sidebar-item" onclick="loadAdminSection('bookings')"><span class="si-icon">📋</span> Bookings</button>
      <button class="sidebar-item" onclick="loadAdminSection('users')"><span class="si-icon">👥</span> Users</button>
      <button class="sidebar-item" onclick="loadAdminSection('schedules')"><span class="si-icon">🕒</span> Schedules</button>
      <button class="sidebar-item" onclick="loadAdminSection('ships')"><span class="si-icon">🚢</span> Ships</button>
      <button class="sidebar-item" onclick="loadAdminSection('routes')"><span class="si-icon">🗺️</span> Routes</button>
      <button class="sidebar-item" onclick="loadAdminSection('fares')"><span class="si-icon">💰</span> Fares</button>
      <button class="sidebar-item" onclick="loadAdminSection('cargo')"><span class="si-icon">📦</span> Cargo Rates</button>
      <button class="sidebar-item" onclick="loadAdminSection('shipping-lines')"><span class="si-icon">🏢</span> Shipping Lines</button>
      <button class="sidebar-item" onclick="loadAdminSection('admins')"><span class="si-icon">👨‍💼</span> Manage Admins</button>
      <div style="height:1px;background:rgba(255,255,255,0.1);margin:8px 20px"></div>
      <button class="sidebar-item" onclick="adminLogout()"><span class="si-icon">🚪</span> Logout</button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="admin-main">
    <div class="admin-topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h2 id="admin-page-title">Dashboard</h2>
      <div style="margin-left:auto;font-size:13px;color:var(--text-secondary)" id="admin-user-name"></div>
    </div>
    <div class="admin-content" id="admin-content">
      <!-- Content loaded dynamically -->
    </div>
  </div>
</div>

</div><!-- #admin-app -->

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal" id="modal-box">
    <h3 id="modal-title">Modal Title</h3>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save-btn" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" style="bottom:16px"></div>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
